plans:
- id: nightly-portfolio-v2
  name: Job Pool V2 Reservoir
  task: orchestration.portfolio_run
  enabled: true
  pipeline_version: v2
  target_ids:
  - ai-implementation
  - saas-implementation
  - revenue-operations-analyst
  - associate-solutions-engineering
  - technical-customer-success
  portfolio_id: default
  cadence: daily
  interval_every: 1
  interval_unit: hours
  # 08:00 UTC = 3:00am Central during daylight-saving time. The overnight
  # launcher starts the stack at 2:00am and keeps it awake long enough for
  # the portfolio's resume + cover-letter tasks to finish before morning.
  hour: 8
  minute: 0
  day_of_week: 1
  day_of_month: 1
  scrape_enabled: true
  apply_mode: review_queue
  skip_previously_applied: true
  top_n: 20
  dry_run: false
  force_refresh: false
  # Hard delivery cap for the live run. This also disables the additive
  # startup-bonus lane for this scheduled batch, keeping overnight material
  # generation bounded to 20 jobs.
  canary_capacity: 20
  created_at: '2026-07-12T00:00:00+00:00'
  updated_at: '2026-07-15T00:00:00+00:00'
