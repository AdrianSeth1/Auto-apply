selected_count: 100
selection_note: >-
  All selected endpoints are net-new to config/companies.yaml and passed the
  production-adapter evidence contract. Lone Wolf was the 101st verified
  endpoint and was omitted because its current role mix was weaker for the
  target cohort.
evidence_contract:
  sample_size: 5
  required_checks: [sample_nonempty, employer_identity_match, unique_nonempty_ids, direct_application_urls, has_location, has_full_description]
activation_policy:
  wave_size: 25
  refresh_strategy: rotating_25_endpoint_groups
  all_groups_eligible_for_snapshot_reuse: true
  primary_metric: net_new_complete_direct_apply_ab_jobs
  raw_posting_count_is_not_a_success_metric: true
  promotion_requires_human_review: false
  active_registry: config/companies.yaml
